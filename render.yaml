# Render Blueprint — Docker deployment
services:
  - type: web
    name: contentflow-ai-v2
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    repo: https://github.com/paisabrazilfl-cpu/contentflow-ai
    branch: main
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
