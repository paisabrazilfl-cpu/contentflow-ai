# Render Blueprint — Node.js runtime
services:
  - type: web
    name: contentflow-ai-v2
    region: oregon
    plan: starter
    repo: https://github.com/paisabrazilfl-cpu/contentflow-ai
    branch: main
    autoDeploy: true
    buildCommand: npm ci
    startCommand: node dist/index.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
