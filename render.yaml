# Render Blueprint — Node.js runtime
services:
  - type: web
    name: contentflow-ai-v2
    runtime: node
    region: oregon
    plan: starter
    repo: https://github.com/paisabrazilfl-cpu/contentflow-ai
    branch: main
    autoDeploy: true
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
