# Render Blueprint
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: contentflow-ai
    runtime: node
    region: oregon
    plan: starter
    repo: https://github.com/paisabrazilfl-cpu/contentflow-ai
    branch: main
    autoDeploy: true
    buildCommand: echo "dist/ pre-built and committed"
    startCommand: node dist/index.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: BUILT_IN_FORGE_API_URL
        sync: false
      - key: BUILT_IN_FORGE_API_KEY
        sync: false
      - key: VITE_FRONTEND_FORGE_API_KEY
        sync: false
      - key: VITE_FRONTEND_FORGE_API_URL
        sync: false
      - key: CRON_SECRET
        generateValue: true
